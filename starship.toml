# starship  config file

# prompt format
format = """
$directory\
$git_branch\
$git_status\
$character
"""

add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold cyan"
truncation_length = 5
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style)) "
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

##  Disable  unwanted  modules
[battery]
disabled = true

[cmd_duration]
disabled = true

[memory_usage]
disabled = true

[package]
disabled = true

[os]
disabled = true
